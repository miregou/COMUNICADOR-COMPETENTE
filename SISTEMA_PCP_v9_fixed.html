    const LEGACY_CASE_KEYS = ['pcp_cases', 'pcp_cases_backup', 'pcp_cases_backup_prev', 'cases', 'pcpCases', 'pcp_expedientes'];

    const safeParseJSON = (value, fallback) => {
      if (!value) return fallback;
      try {
        return JSON.parse(value);
      } catch (error) {
        console.warn('No se pudo leer un bloque JSON persistido. Se restaura el valor por defecto.', error);
        return fallback;
      }
    };

    const parseFlexibleJSON = (raw) => {
      if (raw === null || raw === undefined) return null;
      if (typeof raw !== 'string') return raw;
      const direct = safeParseJSON(raw, null);
      if (direct !== null) {
        if (typeof direct === 'string') {
          const secondPass = safeParseJSON(direct, null);
          return secondPass !== null ? secondPass : direct;
        }
        return direct;
      }
      const firstArray = raw.indexOf('[');
      const lastArray = raw.lastIndexOf(']');
      if (firstArray >= 0 && lastArray > firstArray) {
        const candidate = raw.slice(firstArray, lastArray + 1);
        const parsedArray = safeParseJSON(candidate, null);
        if (parsedArray !== null) return parsedArray;
      }
      const firstObj = raw.indexOf('{');
      const lastObj = raw.lastIndexOf('}');
      if (firstObj >= 0 && lastObj > firstObj) {
        const candidate = raw.slice(firstObj, lastObj + 1);
        const parsedObj = safeParseJSON(candidate, null);
        if (parsedObj !== null) return parsedObj;
      }
      return null;
    };

    const readStorageItem = (key) => {
      try {
        return typeof localStorage !== 'undefined' ? localStorage.getItem(key) : null;
      } catch (error) {
        console.warn(`No se pudo leer la clave ${key} desde almacenamiento local.`, error);
        return null;
      }
    };

    const saveJSON = (key, value) => {
      try {
        localStorage.setItem(key, JSON.stringify(value));
      } catch (error) {
        console.error(`No se pudo persistir la clave ${key}.`, error);
      }
    };

    const removeStorageKey = (key) => {
      try {
        localStorage.removeItem(key);
      } catch (error) {
        console.error(`No se pudo eliminar la clave ${key}.`, error);
      }
    };

    const isValidCasesPayload = (value) => Array.isArray(value) && value.every(item => item && typeof item === 'object' && Array.isArray(item.evaluations));

    const extractCasesFromUnknownPayload = (payload) => {
      if (!payload) return [];
      if (isValidCasesPayload(payload)) return payload;
      if (payload && typeof payload === 'object') {
        if (isValidCasesPayload(payload.cases)) return payload.cases;
        if (isValidCasesPayload(payload.expedientes)) return payload.expedientes;
        if (isValidCasesPayload(payload.data)) return payload.data;
        if (isValidCasesPayload(payload.records)) return payload.records;
        if (isValidCasesPayload(payload.value)) return payload.value;
        if (isValidCasesPayload(payload.items)) return payload.items;
        if (Array.isArray(payload) && isValidCasesPayload(payload)) return payload;
      }
      if (payload && typeof payload === 'object' && Array.isArray(payload.evaluations)) return [payload];
      return [];
    };

    const extractManualOverridesFromUnknownPayload = (payload) => {
      if (!payload || typeof payload !== 'object') return {};
      const candidates = [
        payload.manualOverrides,
        payload.manual_overrides,
        payload.config?.manualOverrides,
        payload.settings?.manualOverrides
      ];
      for (const candidate of candidates) {
        if (candidate && typeof candidate === 'object' && !Array.isArray(candidate)) return candidate;
      }
      return {};
    };

    const mergeCaseCollections = (...collections) => {
      const byId = new Map();
      collections.flat().forEach(caseData => {
        if (!caseData || typeof caseData !== 'object') return;
        const key = caseData.id || `${caseData.name || 'sin_nombre'}::${(caseData.evaluations || []).length}`;
        const previous = byId.get(key);
        if (!previous) {
          byId.set(key, caseData);
          return;
        }
        const prevCount = Array.isArray(previous.evaluations) ? previous.evaluations.length : 0;
        const nextCount = Array.isArray(caseData.evaluations) ? caseData.evaluations.length : 0;
        byId.set(key, nextCount >= prevCount ? caseData : previous);
      });
      return Array.from(byId.values());
    };

    const collectCandidateCasePayloads = () => {
      const explicit = [
        STORAGE_KEYS.cases,
        STORAGE_KEYS.casesBackup,
        STORAGE_KEYS.casesBackupPrev,
        ...LEGACY_CASE_KEYS
      ];
      const dynamic = [];
      try {
        if (typeof localStorage !== 'undefined') {
          for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i);
            if (!k) continue;
            if (/pcp|case|expediente/i.test(k)) dynamic.push(k);
          }
        }
      } catch (error) {
        console.warn('No se pudo enumerar almacenamiento local.', error);
      }
      return Array.from(new Set([...explicit, ...dynamic]));
    };

    const inspectLocalCaseSources = () => {
      const diagnostics = [];
      collectCandidateCasePayloads().forEach(key => {
        const raw = readStorageItem(key);
        if (!raw) return;
        const parsed = parseFlexibleJSON(raw);
        const extracted = extractCasesFromUnknownPayload(parsed);
        diagnostics.push({
          key,
          rawLength: raw.length,
          count: extracted.length,
          valid: extracted.length > 0
        });
      });
      return diagnostics.sort((a, b) => (b.count - a.count) || (b.rawLength - a.rawLength));
    };

    const loadCasesFromStorage = () => {
      const recovered = [];
      collectCandidateCasePayloads().forEach(key => {
        const parsed = parseFlexibleJSON(readStorageItem(key));
        const extracted = extractCasesFromUnknownPayload(parsed);
        if (extracted.length > 0) recovered.push(extracted);
      });
      return mergeCaseCollections(...recovered);
    };

    const persistCasesWithBackup = (cases) => {
      const safeCases = Array.isArray(cases) ? cases : [];
      const currentMain = safeParseJSON(readStorageItem(STORAGE_KEYS.cases), null);
      if (isValidCasesPayload(currentMain) && currentMain.length > 0) {
        saveJSON(STORAGE_KEYS.casesBackupPrev, currentMain);
      }
      const currentBackup = safeParseJSON(readStorageItem(STORAGE_KEYS.casesBackup), null);
      if (isValidCasesPayload(currentBackup) && currentBackup.length > 0) {
        saveJSON(STORAGE_KEYS.casesBackupPrev, currentBackup);
      }
      saveJSON(STORAGE_KEYS.casesBackup, safeCases);
      saveJSON(STORAGE_KEYS.cases, safeCases);
    };

    const isNum = v => v !== 'NO' && v !== 'NP' && !isNaN(parseInt(v));
    const computeContextAdjustment = (sNum, eNum) => {
      const step = (value) => value === null ? 0 : value > 0 ? 0.25 : value < 0 ? -0.25 : 0;
      return step(sNum) + step(eNum);
    };

    // Calcula resultados para un caso dado
    // REGLA: NO = No / NP = No Procede. Solo excluye esa dimensión, no el ítem completo.
    // R_abs del ítem = mínimo de las dimensiones con puntuación numérica (0–4).
    // Si las 3 dimensiones son NO/NP → el ítem no entra en ninguna media.
    function computeResults(caseData) {
      const areaStats = AREAS.map(area => {
        let weightedSumD = 0, totalWD = 0;
        let weightedSumGain = 0, totalWGain = 0;
        let wSumS = 0, wTotS = 0;
        let wSumE = 0, wTotE = 0;
        let wSumP = 0, wTotP = 0;
        let alertCrit = false, criticalAlertCount = 0, noNpCount = 0;

        for (let i = 1; i <= 12; i++) {
          const indId = `${area.id}_${i}`;
          const meta = MASTER_DB[indId];
          const score = caseData.scores[area.id]?.[indId];
          if (!score) continue;
          const w = WEIGHTS[meta.type];

          const sNum = isNum(score.s) ? parseInt(score.s) : null;
          const eNum = isNum(score.e) ? parseInt(score.e) : null;
          const pNum = isNum(score.p) ? parseInt(score.p) : null;

          // Medias individuales por dimensión (S, E en CIF -4 a +4; P en 0-4)
          if (sNum !== null) { wSumS += sNum * w; wTotS += w; }
          if (eNum !== null) { wSumE += eNum * w; wTotE += w; }
          if (pNum !== null) { wSumP += pNum * w; wTotP += w; }

          // Ajuste contextual fijo:
          // cada valor positivo en S o E suma +0.25 a P;
          // cada valor negativo en S o E resta -0.25 a P.
          const faVals = [sNum, eNum].filter(v => v !== null);
          const fa = faVals.length > 0 ? faVals.reduce((a, b) => a + b, 0) / faVals.length : 0;
          const ctxAdj = computeContextAdjustment(sNum, eNum);

          if (pNum !== null) {
            const d = Math.min(4, Math.max(0, pNum + ctxAdj));
            const gain = d - pNum;

            weightedSumD += d * w;
            totalWD += w;
            weightedSumGain += gain * w;
            totalWGain += w;

            if (meta.type === 'CRITICO' && pNum <= 2) {
              alertCrit = true;
              criticalAlertCount += 1;
            }
          } else {
            noNpCount++;
          }
        }

        return {
          id: area.id, name: area.name, weight: area.weight,
          abs: totalWD > 0 ? weightedSumD / totalWD : null, // Desempeño Promedio
          gain: totalWGain > 0 ? weightedSumGain / totalWGain : null,
          absS: wTotS > 0 ? wSumS / wTotS : null,
          absE: wTotE > 0 ? wSumE / wTotE : null,
          absP: wTotP > 0 ? wSumP / wTotP : null,
          alertCrit, criticalAlertCount, noNpCount, valid: noNpCount <= 3
        };
      });

      const globalAvg = (key) => {
        let sum = 0, tot = 0;
        areaStats.forEach(a => {
          if (a[key] === null) return;
          const w = a.id === 'cv' ? 1.5 : 1;
          sum += a[key] * w; tot += w;
        });
        return tot > 0 ? sum / tot : null;
      };

      const globalAbs = globalAvg('abs');
      const globalGain = globalAvg('gain');
      const globalS = globalAvg('absS');
      const globalE = globalAvg('absE');
      const globalP = globalAvg('absP');

      const cvStat = areaStats.find(a => a.id === 'cv');
      const severeAreaCount = areaStats.filter(a => a.abs !== null && a.abs <= 1.75).length;
      const verySevereAreaCount = areaStats.filter(a => a.abs !== null && a.abs <= 1.5).length;
      const criticalAlertCount = areaStats.reduce((sum, area) => sum + (area.criticalAlertCount || 0), 0);

      const n3Eligible = (
        (criticalAlertCount >= 2 && severeAreaCount >= 3) ||
        (cvStat.abs !== null && cvStat.abs <= 1.5 && severeAreaCount >= 3) ||
        (globalAbs !== null && globalAbs <= 1.75 && verySevereAreaCount >= 4)
      );
      const n2Eligible = areaStats.some(a => a.abs !== null && a.abs <= 2.0);
      const suggestedLevel = n3Eligible ? 3 : n2Eligible ? 2 : 1;

      return {
        areaStats,
        globalAbs,
        globalGain,
        globalS,
        globalE,
        globalP,
        suggestedLevel,
        cvAbs: cvStat.abs,
        severeAreaCount,
        verySevereAreaCount,
        criticalAlertCount,
        n3Eligible,
        n2Eligible
      };
    }

    const getLatestEvaluation = (caseData) => {
      if (!caseData?.evaluations?.length) return null;
      return caseData.evaluations[caseData.evaluations.length - 1];
    };

    const getAssignedLevel = (caseData, results = null) => {
      const storedLevel = caseData?.levelAssignment?.version === LEVEL_RULE_VERSION
        ? caseData.levelAssignment.level
        : null;
      if ([1, 2, 3].includes(storedLevel)) return storedLevel;
      if (!results) return 1;
      return results.suggestedLevel;
    };

    const assignCaseLevel = (results, usedN3Slots) => {
      const rawLevel = results ? results.suggestedLevel : 1;
      if (rawLevel !== 3) {
        return { level: rawLevel, usedN3Slots };
      }

      if (usedN3Slots < CUPOS.N3) {
        return { level: 3, usedN3Slots: usedN3Slots + 1 };
      }

      return { level: 2, usedN3Slots };
    };

    const getIndicatorMetrics = (score) => {
      if (!score) return null;
      const sNum = isNum(score.s) ? parseInt(score.s) : null;
      const eNum = isNum(score.e) ? parseInt(score.e) : null;
      const pNum = isNum(score.p) ? parseInt(score.p) : null;
      const faVals = [sNum, eNum].filter(v => v !== null);
      const fa = faVals.length > 0 ? faVals.reduce((a, b) => a + b, 0) / faVals.length : null;
      const ctxAdj = computeContextAdjustment(sNum, eNum);
      const d = pNum !== null ? Math.min(4, Math.max(0, pNum + ctxAdj)) : null;
      const gain = pNum !== null && d !== null ? d - pNum : null;
      return { sNum, eNum, pNum, fa, ctxAdj, d, gain, hasD: d !== null };
    };

    // ─── COMPONENTE: Detalle de Indicador ───────────────────────────────────────
    const IndicatorDetail = ({ indicatorId, areaName, onClose }) => {

    // ─── APP PRINCIPAL ──────────────────────────────────────────────────────────
    function App() {
      const [view, setView] = useState('institutional');
      const [cases, setCases] = useState(() => loadCasesFromStorage());
      const [activeCaseId, setActiveCaseId] = useState(null);
      const [activeEvId, setActiveEvId] = useState(null);
      const [detailId, setDetailId] = useState(null);
      const [showMethodology, setShowMethodology] = useState(false);

      // Estados para Modales
      const [isNewCaseModalOpen, setIsNewCaseModalOpen] = useState(false);
      const [isEditCaseModalOpen, setIsEditCaseModalOpen] = useState(null); // id del caso a editar
      const [isDeleteConfirmOpen, setIsDeleteConfirmOpen] = useState(null); // id del caso a borrar
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [isManualEditorOpen, setIsManualEditorOpen] = useState(false);
      const [driveConfig, setDriveConfig] = useState(() => {
        const saved = safeParseJSON(readStorageItem(STORAGE_KEYS.driveConfig), { clientId: '' });
        return typeof saved === 'object' && saved !== null ? saved : { clientId: '' };
      });
      const [isDriveConnected, setIsDriveConnected] = useState(false);
      const [accessToken, setAccessToken] = useState(null); // Guardamos el token
      const importCasesInputRef = React.useRef(null);
      const [storageDiagnostics, setStorageDiagnostics] = useState(() => inspectLocalCaseSources());
      const [casesFileHandle, setCasesFileHandle] = useState(null);
      const [casesFileName, setCasesFileName] = useState('');
      const [autoSaveToFile, setAutoSaveToFile] = useState(true);
      const [lastFileSaveAt, setLastFileSaveAt] = useState('');
      const startupFilePromptedRef = React.useRef(false);
      const REQUIRE_LINKED_FILE = true;
      const [activeFilter, setActiveFilter] = useState('TODOS');
      const [activeArea, setActiveArea] = useState('acc');
      const [manualOverrides, setManualOverrides] = useState(() => {
        const saved = safeParseJSON(readStorageItem(STORAGE_KEYS.manualOverrides), {});
        return saved && typeof saved === 'object' ? saved : {};
      });
      const [dimConfig, setDimConfig] = useState(() => {
        const saved = safeParseJSON(readStorageItem(STORAGE_KEYS.dimConfig), {});
        return typeof saved === 'object' && saved !== null ? saved : {};
      });

      // --- Lógica Google Drive ---
      const SCOPES = 'https://www.googleapis.com/auth/drive.file';

      const initAuth = async () => {
        if (!driveConfig.clientId) return;
        const savedToken = safeParseJSON(readStorageItem(STORAGE_KEYS.driveToken), null);
        const token = typeof savedToken === 'string' ? savedToken : savedToken?.accessToken;
        const expiresAt = typeof savedToken === 'object' && savedToken !== null ? savedToken.expiresAt : null;

        if (expiresAt && Date.now() >= expiresAt) {
          clearDriveSession();
          return;
        }

        if (token) {
          setAccessToken(token);
          setIsDriveConnected(true);
        }
      };

      const handleAuth = () => {
        if (!driveConfig.clientId?.trim()) {
          alert("Primero guarda un Client ID válido en Ajustes.");
          return;
        }

        if (!window.google?.accounts?.oauth2) {
          alert("Google Identity Services aún no está disponible. Recarga la página y vuelve a intentarlo.");
          return;
        }

        try {
          const tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: driveConfig.clientId.trim(),
            scope: SCOPES,
            callback: async (response) => {
              if (response.error !== undefined) throw response;
              const tokenValue = response.access_token;
              const expiresAt = response.expires_in ? Date.now() + (response.expires_in * 1000) : null;
              setAccessToken(tokenValue);
              saveJSON(STORAGE_KEYS.driveToken, { accessToken: tokenValue, expiresAt });
              setIsDriveConnected(true);
            },
          });
          tokenClient.requestAccessToken({ prompt: 'consent' });
        } catch (error) {
          console.error("Drive Auth Error:", error);
          alert("No se pudo iniciar la autenticación con Google Drive.");
        }
      };

      const saveToDrive = async (caseData, silent = false) => {
        if (!isDriveConnected || !accessToken) {
          if (!silent) alert("Primero conecta con Google Drive en Ajustes.");
          return;
        }

        try {
          const fileName = `PCP_${sanitizeFilePart(caseData.name)}_${sanitizeFilePart(caseData.id, 'caso')}.json`;
          const fileContent = JSON.stringify(caseData, null, 2);
          const metadata = {
            name: fileName,
            mimeType: 'application/json',
          };

          const boundary = 'foo_bar_baz';
          const delimiter = "\r\n--" + boundary + "\r\n";
          const close_delim = "\r\n--" + boundary + "--";

          const body =
            delimiter +
            'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
            JSON.stringify(metadata) +
            delimiter +
            'Content-Type: application/json\r\n\r\n' +
            fileContent +
            close_delim;

          const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer ' + accessToken,
              'Content-Type': 'multipart/related; boundary=' + boundary,
            },
            body: body,
          });

          if (response.ok) {
            if (!silent) alert(`¡Expediente "${caseData.name}" guardado en Drive!`);
          } else {
            if (response.status === 401 || response.status === 403) {
              setAccessToken(null);
              setIsDriveConnected(false);
              clearDriveSession();
            }
            throw new Error(`Error al subir "${caseData.name}"`);
          }
        } catch (err) {
          console.error("Drive Save Error:", err);
          if (!silent) alert("Error al guardar en Drive: " + err.message);
        }
      };

      const saveAllToDrive = async () => {
        if (!isDriveConnected) {
          alert("Primero conecta Drive en Ajustes.");
          return;
        }
        for (const c of cases) {
          await saveToDrive(c, true);
        }
        alert(`Se han intentado guardar ${cases.length} expedientes en Drive.`);
      };

      const recoverFromLegacyStorage = () => {
        const found = [];
        collectCandidateCasePayloads().forEach(key => {
          const parsed = parseFlexibleJSON(readStorageItem(key));
          const extracted = extractCasesFromUnknownPayload(parsed);
          if (extracted.length > 0) {
            found.push({ key, data: extracted });
          }
        });
        if (found.length === 0) {
          alert("No se encontraron expedientes en claves antiguas del navegador para esta ruta.");
          return;
        }
        const mergedRecovered = mergeCaseCollections(...found.map(f => f.data));
        const mergedWithCurrent = mergeCaseCollections(cases, mergedRecovered);
        setCases(mergedWithCurrent);
        setStorageDiagnostics(inspectLocalCaseSources());
        alert(`Recuperación aplicada desde ${found.length} fuentes locales. Expedientes recuperados/actualizados: ${mergedWithCurrent.length}.`);
      };

      const triggerImportCases = () => {
        if (importCasesInputRef.current) importCasesInputRef.current.click();
      };

      const handleImportCasesFile = (event) => {
        const file = event.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          const parsed = parseFlexibleJSON(reader.result);
          const importedCases = extractCasesFromUnknownPayload(parsed);
          const importedManualOverrides = extractManualOverridesFromUnknownPayload(parsed);
          const hasCases = Array.isArray(importedCases) && isValidCasesPayload(importedCases);
          const hasManual = importedManualOverrides && Object.keys(importedManualOverrides).length > 0;
          if (!hasCases && !hasManual) {
            alert("El archivo JSON no tiene un formato PCP válido. Debe incluir 'cases' (o 'expedientes') y/o 'manualOverrides'.");
            return;
          }
          const merged = hasCases ? mergeCaseCollections(cases, importedCases) : cases;
          if (hasCases) setCases(merged);
          if (hasManual) setManualOverrides(importedManualOverrides);
          setActiveCaseId(null);
          setActiveEvId(null);
          setView('institutional');
          setStorageDiagnostics(inspectLocalCaseSources());
          alert(`Importación completada.${hasCases ? ` Expedientes cargados: ${merged.length}.` : ''}${hasManual ? ' Manual personalizado cargado.' : ''}`);
        };
        reader.onerror = () => alert("No se pudo leer el archivo seleccionado.");
        reader.readAsText(file, 'utf-8');
        event.target.value = '';
      };

      const refreshStorageDiagnostics = () => {
        setStorageDiagnostics(inspectLocalCaseSources());
      };

      const exportToExcel = (targetCases = cases) => {
        try {
          if (!window.XLSX) {
            alert("La librería de Excel aún se está cargando o no ha podido cargarse. Por favor, comprueba tu conexión a internet.");
            return;
          }

          const rows = [];
          targetCases.forEach(c => {
            c.evaluations.forEach((ev, idx) => {
              // Ajuste: pasamos el objeto de la evaluación (ev) que contiene los scores
              const res = computeResults(ev); 
              const assignedLevel = getAssignedLevel(c, res);
              
              const row = {
                "Nombre": c.name,
                "Fecha Ev.": ev.date,
                "Expediente ID": c.id,
                "Orden": idx + 1,
                "Desempeño Global": toExcelMetric(res.globalAbs),
                "Calidad de Vida": toExcelMetric(res.cvAbs),
                "Ganancia Global": toExcelMetric(res.globalGain),
                "Nivel Sugerido": `N${assignedLevel}`,
                "S (Media)": toExcelMetric(res.globalS),
                "E (Media)": toExcelMetric(res.globalE),
                "P (Media)": toExcelMetric(res.globalP),
                "PFR Perfil": c.pfr.symbolicProfile,
                "PFR Cognitivo": c.pfr.cognitive,
                "PFR Motor": c.pfr.motor,
                "PFR Sensorial": c.pfr.sensory,
                "PFR Prioridades": c.pfr.priorities
              };

              // Añadir puntajes por área usando areaStats
              AREAS.forEach(a => {
                const aStat = res.areaStats.find(s => s.id === a.id);
                if (aStat) {
                  row[`A-${a.id} (Abs)`] = toExcelMetric(aStat.abs);
                  row[`A-${a.id} (S)`] = toExcelMetric(aStat.absS);
                  row[`A-${a.id} (E)`] = toExcelMetric(aStat.absE);
                  row[`A-${a.id} (P)`] = toExcelMetric(aStat.absP);
                }
              });

      const buildWordProfilePerformanceSvg = (results, areaLabels, docTheme, assignedLevel) => {
        if (!results) return '';
        const width = 740;
        const height = 420;
        const cx = 250;
        const cy = 210;

        const pValues = results.areaStats.map(a => a.absP ?? 1);
        const pointsFor = (values) => values.map((value, index) => {
          const angle = (-Math.PI / 2) + (index * (2 * Math.PI / values.length));
          const normalized = Math.max(0, Math.min(4, value));
          const r = (normalized / 4) * radius;
          const x = cx + (r * Math.cos(angle));
          const y = cy + (r * Math.sin(angle));
          return `${x.toFixed(1)},${y.toFixed(1)}`;

              const y = cy + (r * Math.sin(angle));
              return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4" fill="${docTheme.chartD}" />`;

      const svgToPngDataUri = (svg) => new Promise((resolve) => {
        try {
          const svgBlob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
          const svgUrl = URL.createObjectURL(svgBlob);
          const img = new Image();
          img.onload = () => {
            try {
              const canvas = document.createElement('canvas');
              canvas.width = img.naturalWidth || 740;
              canvas.height = img.naturalHeight || 420;
              const ctx = canvas.getContext('2d');
              if (!ctx) {
                URL.revokeObjectURL(svgUrl);
                resolve(`data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`);
                return;
              }
              ctx.drawImage(img, 0, 0);
              const pngData = canvas.toDataURL('image/png');
              URL.revokeObjectURL(svgUrl);
              resolve(pngData);
            } catch (error) {
              URL.revokeObjectURL(svgUrl);
              resolve(`data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`);
            }
          };
          img.onerror = () => {
            URL.revokeObjectURL(svgUrl);
            resolve(`data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`);
          };
          img.src = svgUrl;
        } catch (error) {

        const qualitativeSummary = (() => {

          const impacts = [];

          AREAS.forEach(area => {
            const areaScores = scores[area.id] || {};
            Object.keys(areaScores).forEach(indId => {
              const item = areaScores[indId];

              if (e !== null) {

                else if (e < 0) counters.eBar += 1;

              if (p !== null) {

              const seVals = [s, e].filter(v => v !== null);
              const fa = seVals.length > 0 ? seVals.reduce((a, b) => a + b, 0) / seVals.length : null;
              const ctxAdj = computeContextAdjustment(s, e);

              const row = {
                indId,
                area: areaLabels[area.id] || area.name,
                name: MASTER_DB[indId]?.name || indId,
                def: MASTER_DB[indId]?.def || '',
                delta,
                firstD: firstM.d,
                lastD: lastM.d
              };
              allItemComparisons.push(row);
              if (Math.abs(delta) < 1) return;
              allItemChanges.push(row);
            });
          });

          const facilitators = allItemChanges
            .filter(item => item.delta > 0)
            .sort((a, b) => b.delta - a.delta)
            .slice(0, 8);
          const barriers = allItemChanges
            .filter(item => item.delta < 0)
            .sort((a, b) => a.delta - b.delta)
            .slice(0, 8);
          const leastChanged = allItemComparisons
            .slice()
            .sort((a, b) => Math.abs(a.delta) - Math.abs(b.delta))
            .slice(0, 8);

          const trendText = deltaD === null
            ? 'No hay datos suficientes para estimar la tendencia global.'
            : deltaD >= 1
              ? `Se observa una mejora global clara del desempeño (ΔD ${fmtSigned(deltaD)}).`
              : deltaD > 0
                ? `Se observa una mejora global moderada del desempeño (ΔD ${fmtSigned(deltaD)}).`
                : deltaD <= -1
                  ? `Se observa una involución global relevante del desempeño (ΔD ${fmtSigned(deltaD)}).`
                  : deltaD < 0
                    ? `Se observa una ligera disminución del desempeño global (ΔD ${fmtSigned(deltaD)}).`
                    : 'El desempeño global se mantiene estable entre el primer y el último registro.';

          const envSysText = (deltaS !== null || deltaE !== null)
            ? `En este cambio, el sistema evoluciona ${deltaS === null ? '—' : fmtSigned(deltaS)} y el entorno ${deltaE === null ? '—' : fmtSigned(deltaE)}.`
            : '';

          const personText = deltaP !== null
            ? `La capacidad personal muestra una variación de ${fmtSigned(deltaP)} entre registros.`
            : '';

          const focusText = barriers.length > 0
            ? `Los aspectos que requieren mayor atención inmediata se concentran en ${barriers.slice(0, 2).map(item => `${item.area}: ${item.name}`).join(' y ')}.`
            : 'No se observan involuciones significativas en los ítems comparados.';

          return {
            deltaD, deltaS, deltaE, deltaP,
            trendText,
            envSysText,
            personText,
            focusText,
            facilitators,
            barriers,
            leastChanged
          };
        })() : null;

        const evolutionAreaSections = hasEvolution ? AREAS.map(area => {
          const areaResults = evaluationSeries.map(({ ev, results }) => {
            const areaStat = results.areaStats.find(a => a.id === area.id);
            return { date: ev.date, abs: areaStat?.abs ?? null, s: areaStat?.absS ?? null, e: areaStat?.absE ?? null, p: areaStat?.absP ?? null };
          });

          const significantRows = Object.keys(evaluations[0]?.scores?.[area.id] || {}).map(indId => {
            const series = evaluations.map(ev => getIndicatorMetrics(ev.scores?.[area.id]?.[indId]));
            const validSeries = series.filter(Boolean).filter(item => item.hasD);
            if (validSeries.length < 2) return null;
            const first = validSeries[0];
            const last = validSeries[validSeries.length - 1];
            const delta = last.d - first.d;
            if (Math.abs(delta) < 1) return null;
            return { indId, delta, first, last, meta: MASTER_DB[indId] };
          }).filter(Boolean);

          significantRows.sort((a, b) => Math.abs(b.delta) - Math.abs(a.delta));
          const notableRows = significantRows.slice(0, 5);
          const firstArea = areaResults[0] || {};
          const lastArea = areaResults[areaResults.length - 1] || {};
          const deltaArea = typeof firstArea.abs === 'number' && typeof lastArea.abs === 'number' ? lastArea.abs - firstArea.abs : null;

          return `
            <section class="section">
              <div class="section-head" style="border-left:4px solid ${areaPalette[area.id] || '#0f172a'};padding-left:12px;">
                <h2 style="margin:0;border:0;padding:0;">Evolución · ${escapeHtml(areaLabels[area.id] || area.name)}</h2>
                <div class="muted small">Solo se muestran ítems con cambio acumulado igual o superior a ±1</div>
              </div>
              <div class="summary" style="grid-template-columns: 1fr 1.1fr;">
                <div class="summary-box">

                  <table>
                    <thead>
                      <tr>
                        <th>Fecha</th>
                        <th>D</th>
                        <th>S</th>
                        <th>E</th>
                        <th>P</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${areaResults.map(item => `
                        <tr>
                          <td>${escapeHtml(item.date)}</td>
                          <td style="text-align:center;">${typeof item.abs === 'number' ? item.abs.toFixed(2) : '—'}</td>
                          <td style="text-align:center;">${typeof item.s === 'number' ? item.s.toFixed(2) : '—'}</td>
                          <td style="text-align:center;">${typeof item.e === 'number' ? item.e.toFixed(2) : '—'}</td>
                          <td style="text-align:center;">${typeof item.p === 'number' ? item.p.toFixed(2) : '—'}</td>
                        </tr>
                      `).join('')}
                    </tbody>
                  </table>
                </div>
                <div class="summary-box">
                  <h3>Balance del área</h3>
                  <div class="kpi-list" style="grid-template-columns: repeat(3, 1fr); margin-bottom: 12px;">
                    <div class="kpi"><div class="label">Mejoran</div><div class="value" style="color:#15803d;">${significantRows.filter(item => item.delta > 0).length}</div></div>
                    <div class="kpi"><div class="label">Empeoran</div><div class="value" style="color:#dc2626;">${significantRows.filter(item => item.delta < 0).length}</div></div>
                    <div class="kpi"><div class="label">Significativos</div><div class="value" style="color:#0f172a;">${significantRows.length}</div></div>
                  </div>
                  <table style="margin-bottom:12px;">
                    <thead>
                      <tr>
                        <th>Métrica</th>
                        <th>Inicio</th>
                        <th>Último</th>
                        <th>Δ</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr>
                        <td>Desempeño (D)</td>
                        <td style="text-align:center;">${typeof firstArea.abs === 'number' ? firstArea.abs.toFixed(2) : '—'}</td>
                        <td style="text-align:center;">${typeof lastArea.abs === 'number' ? lastArea.abs.toFixed(2) : '—'}</td>
                        <td style="text-align:center;font-weight:700;color:${deltaArea !== null && deltaArea > 0 ? '#15803d' : deltaArea !== null && deltaArea < 0 ? '#dc2626' : '#64748b'};">${deltaArea === null ? '—' : fmtSigned(deltaArea)}</td>
                      </tr>
                      <tr>
                        <td>Sistema (S)</td>
                        <td style="text-align:center;">${typeof firstArea.s === 'number' ? firstArea.s.toFixed(2) : '—'}</td>
                        <td style="text-align:center;">${typeof lastArea.s === 'number' ? lastArea.s.toFixed(2) : '—'}</td>
                        <td style="text-align:center;font-weight:700;">${typeof firstArea.s === 'number' && typeof lastArea.s === 'number' ? fmtSigned(lastArea.s - firstArea.s) : '—'}</td>
                      </tr>
                      <tr>
                        <td>Entorno (E)</td>
                        <td style="text-align:center;">${typeof firstArea.e === 'number' ? firstArea.e.toFixed(2) : '—'}</td>
                        <td style="text-align:center;">${typeof lastArea.e === 'number' ? lastArea.e.toFixed(2) : '—'}</td>
                        <td style="text-align:center;font-weight:700;">${typeof firstArea.e === 'number' && typeof lastArea.e === 'number' ? fmtSigned(lastArea.e - firstArea.e) : '—'}</td>
                      </tr>
                      <tr>
                        <td>Persona (P)</td>
                        <td style="text-align:center;">${typeof firstArea.p === 'number' ? firstArea.p.toFixed(2) : '—'}</td>
                        <td style="text-align:center;">${typeof lastArea.p === 'number' ? lastArea.p.toFixed(2) : '—'}</td>
                        <td style="text-align:center;font-weight:700;">${typeof firstArea.p === 'number' && typeof lastArea.p === 'number' ? fmtSigned(lastArea.p - firstArea.p) : '—'}</td>
                      </tr>
                    </tbody>
                  </table>
                  <h3>Ítems significativos</h3>
                  <table>
                    <thead>
                      <tr>
                        <th>Ítem</th>
                        <th>Inicio</th>
                        <th>Último</th>
                        <th>Δ acumulada</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${significantRows.length > 0 ? notableRows.map(row => `
                        <tr>
                          <td>
                            <div style="font-weight:700;color:#0f172a;">${escapeHtml(row.meta?.name || row.indId)}</div>

                          </td>
                          <td style="text-align:center;">${typeof row.first?.d === 'number' ? row.first.d.toFixed(2) : '—'}</td>
                          <td style="text-align:center;">${typeof row.last?.d === 'number' ? row.last.d.toFixed(2) : '—'}</td>
                          <td style="text-align:center;font-weight:700;color:${row.delta > 0 ? '#15803d' : row.delta < 0 ? '#dc2626' : '#64748b'};">${fmtSigned(row.delta)}</td>
                        </tr>
                      `).join('') : `<tr><td colspan="4" class="muted">No hay cambios significativos en este área.</td></tr>`}
                    </tbody>
                  </table>
                </div>
              </div>
            </section>
          `;
        }).join('') : '';

        return `

                  <div class="summary" style="margin-top:10px;">
                    <div class="summary-box">

                      <p>Entorno compensa aproximadamente el <strong>${qualitativeSummary.envComp !== null ? qualitativeSummary.envComp.toFixed(0) : '—'}%</strong> del contexto funcional.</p>
                      <p class="small muted">Barrera crítica detectada: <strong>${escapeHtml(qualitativeSummary.criticalBarrier?.name || '—')}</strong> (${escapeHtml(qualitativeSummary.criticalBarrier?.area || '—')}).</p>
                    </div>
                  </div>
                  <div class="summary" style="margin-top:10px;">
                    <div class="summary-box">
                      <h3>Ítems significativos · Facilitadores</h3>
                      ${qualitativeSummary.facilitatorItems.length > 0 ? `
                        <ul class="plain-list">
                          ${qualitativeSummary.facilitatorItems.slice(0, 5).map(item => `
                            <li>
                              <strong>${escapeHtml(item.name)}</strong> · <span class="muted">${escapeHtml(item.area)}</span><br/>
                              ${escapeHtml(item.plainText || '')}
                            </li>
                          `).join('')}
                        </ul>
                      ` : `<p class="muted">No se han detectado facilitadores significativos en este registro.</p>`}
                    </div>
                    <div class="summary-box">
                      <h3>Ítems significativos · Barreras</h3>
                      ${qualitativeSummary.barrierItems.length > 0 ? `
                        <ul class="plain-list">
                          ${qualitativeSummary.barrierItems.slice(0, 5).map(item => `

                      ` : `<p class="muted">No se han detectado barreras significativas en este registro.</p>`}
                    </div>
                  </div>
                </div>

                <div class="section">
                  <h2>Perfil y desempeño</h2>
                  <img src="${profileChartUri}" alt="Perfil y desempeño por áreas" style="width:100%;max-width:100%;max-height:320px;object-fit:contain;border:1px solid #e2e8f0;border-radius:18px;display:block;" />
                </div>

                <div class="section">
                  <h2>Resumen actual por áreas</h2>
                  <div class="grid" style="grid-template-columns: repeat(2, 1fr);">
                    ${areaCurrentCards}
                  </div>
                </div>

                ${hasEvolution ? `
                  <div class="section">
                    <h2>Síntesis de evolución entre registros</h2>
                    <div class="narrative">
                      <p>${escapeHtml(evolutionExecutive?.trendText || '')} ${escapeHtml(evolutionExecutive?.envSysText || '')} ${escapeHtml(evolutionExecutive?.personText || '')}</p>
                      <p style="margin-top:8px;">${escapeHtml(evolutionExecutive?.focusText || '')}</p>
                    </div>
                    <div class="summary">
                      <div class="summary-box">
                        <h3>Facilitadores decisivos del cambio</h3>
                        ${(evolutionExecutive?.facilitators?.length || 0) > 0 ? `

                            ${evolutionExecutive.facilitators.slice(0, 4).map(item => `
