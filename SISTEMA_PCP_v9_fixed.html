                    <div class="summary">
                      <div class="summary-box">
                        <h3>Ítems que más evolucionan</h3>
                        ${((evolutionExecutive?.facilitators?.length || 0) + (evolutionExecutive?.barriers?.length || 0)) > 0 ? `
                          <ul class="plain-list">
                            ${[...(evolutionExecutive?.facilitators || []), ...(evolutionExecutive?.barriers || [])]
                              .sort((a, b) => Math.abs(b.delta) - Math.abs(a.delta))
                              .slice(0, 8)
                              .map(item => `
                                <li>
                                  <strong>${escapeHtml(item.name)}</strong> · <span class="muted">${escapeHtml(item.area)}</span><br/>
                                  Evoluciona de ${item.firstD.toFixed(2)} a ${item.lastD.toFixed(2)} (${fmtSigned(item.delta)}).
                                  ${item.delta > 0 ? 'Este cambio está aportando una mejora funcional relevante.' : 'Este cambio está generando una pérdida funcional relevante y requiere atención.'}
                                </li>
                              `).join('')}
                          </ul>
                        ` : `<p class="muted">No se observan cambios significativos (±1) entre el primer y el último registro.</p>`}
                      </div>
                      <div class="summary-box">
                        <h3>Ítems con menor evolución</h3>
                        ${(evolutionExecutive?.leastChanged?.length || 0) > 0 ? `
                          <ul class="plain-list">
                            ${evolutionExecutive.leastChanged.slice(0, 8).map(item => `
                              <li>
                                <strong>${escapeHtml(item.name)}</strong> · <span class="muted">${escapeHtml(item.area)}</span><br/>
                                Evoluciona de ${item.firstD.toFixed(2)} a ${item.lastD.toFixed(2)} (${fmtSigned(item.delta)}).
                                Mantiene un patrón estable; conviene revisar si los apoyos actuales son suficientes para desbloquear progreso.
                              </li>
                            `).join('')}
                          </ul>
                        ` : `<p class="muted">No hay información suficiente para identificar ítems de baja evolución.</p>`}
                      </div>
                    </div>
                  </div>
                ` : ''}

                <div class="footer-note">
                  Documento generado automáticamente desde PCP · Formato editable e imprimible en Microsoft Word (.doc).
                </div>
              </div>
            </body>
          </html>
        `;
      };

      const exportToWord = async (caseData = activeCase) => {
        try {
          if (!caseData) {
            alert("No hay expediente activo para exportar.");
            return;
          }

          const latestEv = getLatestEvaluation(caseData);
          const currentResults = latestEv ? computeResults(latestEv) : null;
          const reportLevel = getAssignedLevel(caseData, currentResults);
          const areaLabels = {
            acc: 'Acceso',
            reg: 'Regulación',
            par: 'Participación',
            com: 'Competencia Comunicativa',
            cv: 'Calidad de Vida'
          };
          const docTheme = (caseData.evaluations || []).length > 1
            ? {
                chartD: '#b91c1c',
                chartP: '#0f766e'
              }
            : {
                chartD: '#0f766e',
                chartP: '#7c3aed'
              };
          const profileSvg = currentResults ? buildWordProfilePerformanceSvg(currentResults, areaLabels, docTheme, reportLevel) : '';
          const profileChartDataUri = profileSvg ? await svgToPngDataUri(profileSvg) : '';
          const html = buildCaseWordDocument(caseData, profileChartDataUri);
          const blob = new Blob([html], { type: 'application/msword;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `PCP_Expediente_${sanitizeFilePart(caseData.name)}_${new Date().toISOString().split('T')[0]}.doc`;
          a.click();
          URL.revokeObjectURL(url);
        } catch (error) {
          console.error("Word Export Error:", error);
          alert("Error al exportar a Word: " + error.message);
        }
      };

      useEffect(() => {
        initAuth();
      }, [driveConfig]);

      // Persistencia
      // Los expedientes ya no se persisten automáticamente en localStorage.
      // Se guardan en archivo local cuando hay archivo vinculado.

      useEffect(() => {
        saveJSON(STORAGE_KEYS.driveConfig, driveConfig);
      }, [driveConfig]);

      useEffect(() => {
        saveJSON(STORAGE_KEYS.dimConfig, dimConfig);
      }, [dimConfig]);

      useEffect(() => {
        applyManualOverrides(manualOverrides);
        saveJSON(STORAGE_KEYS.manualOverrides, manualOverrides);
      }, [manualOverrides]);

      useEffect(() => {
        if (!autoSaveToFile || !casesFileHandle) return;
        writeCasesToFileHandle(casesFileHandle, cases, true);
      }, [cases, manualOverrides, autoSaveToFile, casesFileHandle]);

      useEffect(() => {
        if (!REQUIRE_LINKED_FILE) return;
        if (casesFileHandle) return;
        if (startupFilePromptedRef.current) return;
        startupFilePromptedRef.current = true;
        alert("Modo protegido activo: para trabajar sin depender de la cuenta del navegador, pulsa 'Abrir archivo local' o 'Importar JSON' y selecciona tu archivo maestro.");
      }, [casesFileHandle]);

      const ensureLinkedFileReady = (actionLabel = 'continuar') => {
        if (!REQUIRE_LINKED_FILE) return true;
        if (casesFileHandle) return true;
        alert(`Primero debes abrir o crear un archivo maestro local para ${actionLabel}. Así los datos no dependen de la cuenta del navegador.`);
        return false;
      };

      applyManualOverrides(manualOverrides);

      // Se desactiva la creación automática de demo para evitar enmascarar
      // o sobrescribir expedientes reales cuando la carga inicial falla.

      function createCase(name, pfr = null) {
        const id = `PCP-${Date.now()}`;
        const defaultScores = {};
        AREAS.forEach(area => {
          defaultScores[area.id] = {};
          for (let i = 1; i <= 12; i++) {
            defaultScores[area.id][`${area.id}_${i}`] = { s: 0, e: 0, p: 3 };
          }
        });
        const dateStr = new Date().toLocaleDateString('es-ES');
        return {
          id, name,
          pfr: pfr || {
            symbolicProfile: 'Simbólico emergente',
            cognitive: 'Grandes Necesidades de Apoyo',
            motor: 'Con Dependencia Física Parcial',
            sensory: 'Hipersensibilidad Sensorial',
            priorities: 'Regulación y Bienestar'
          },
          evaluations: [
            {
              id: `EV-${Date.now()}-${Math.floor(Math.random() * 1000)}`,
              date: dateStr,
              scores: defaultScores
            }
          ]
        };
      }

      const handleCreateCase = (name, pfr) => {
        if (!ensureLinkedFileReady('crear expedientes')) return;
        const nc = createCase(name, pfr);
        setCases(prev => [...prev, nc]);
        setActiveCaseId(nc.id);
        setActiveEvId(nc.evaluations[0].id);
        setIsNewCaseModalOpen(false);
        setView('case');
      };

      const handleEditCase = (name, pfr) => {
        setCases(prev => prev.map(c => c.id === isEditCaseModalOpen ? { ...c, name, pfr } : c));
        setIsEditCaseModalOpen(null);
      };

      const handleDeleteCase = () => {
        setCases(prev => prev.filter(c => c.id !== isDeleteConfirmOpen));
        if (activeCaseId === isDeleteConfirmOpen) {
          setActiveCaseId(null);
          setView('institutional');
        }
        setIsDeleteConfirmOpen(null);
      };

      const activeCase = useMemo(() => cases.find(c => c.id === activeCaseId), [cases, activeCaseId]);

      const activeEvaluation = useMemo(() => {
        if (!activeCase || !activeCase.evaluations) return null;
        return activeEvId ? activeCase.evaluations.find(e => e.id === activeEvId) : activeCase.evaluations[activeCase.evaluations.length - 1]; // Última por defecto
      }, [activeCase, activeEvId]);

      const wordExportTarget = activeCase || cases[cases.length - 1] || null;

      const results = useMemo(() => activeEvaluation ? computeResults(activeEvaluation) : null, [activeEvaluation]);

      useEffect(() => {
        setCases(prev => {
          let changed = false;
          let usedN3Slots = 0;

          const next = prev.map(caseData => {
            const storedLevel = caseData.levelAssignment?.version === LEVEL_RULE_VERSION
              ? caseData.levelAssignment.level
              : null;

            if ([1, 2, 3].includes(storedLevel)) {
              if (storedLevel === 3) usedN3Slots += 1;
              return caseData;
            }

            const latestEv = getLatestEvaluation(caseData);
            const caseResults = latestEv ? computeResults(latestEv) : null;
            const rawLevel = caseResults ? caseResults.suggestedLevel : 1;
            const assigned = assignCaseLevel(caseResults, usedN3Slots);
            usedN3Slots = assigned.usedN3Slots;
            changed = true;

            return {
              ...caseData,
              levelAssignment: {
                level: assigned.level,
                rawLevel,
                version: LEVEL_RULE_VERSION,
                assignedAt: caseData.levelAssignment?.assignedAt || new Date().toISOString()
              }
            };
          });

          return changed ? next : prev;
        });
      }, [cases]);

      const handleScore = (areaId, indId, dim, val) => {
        if (!ensureLinkedFileReady('registrar puntuaciones')) return;
        const currentScrollY = window.scrollY;
        const currentScrollX = window.scrollX;

        setCases(prev => prev.map(c => {
          if (c.id !== activeCaseId) return c;
          const targetEvId = activeEvId || c.evaluations[c.evaluations.length - 1].id;
          let caseChanged = false;
          const updatedEvs = c.evaluations.map(ev => {
            if (ev.id !== targetEvId) return ev;
            const currentValue = ev.scores?.[areaId]?.[indId]?.[dim];
            if (currentValue === val) return ev;
            caseChanged = true;
            return {
              ...ev,
              scores: {
                ...ev.scores,
                [areaId]: {
                  ...ev.scores[areaId],
                  [indId]: { ...ev.scores[areaId][indId], [dim]: val }
                }
              }
            };
          });
          return caseChanged ? { ...c, evaluations: updatedEvs } : c;
        }));

        // Evita que el UI vuelva al inicio tras puntuar:
        // mantenemos la posición de scroll.
        requestAnimationFrame(() => {
          window.scrollTo(currentScrollX, currentScrollY);
        });
      };

      const handleAddEvaluation = () => {
        if (!ensureLinkedFileReady('añadir evaluaciones')) return;
        const nextEvId = `EV-${Date.now()}-${Math.floor(Math.random() * 1000)}`;
        setCases(prev => prev.map(c => {
          if (c.id !== activeCaseId) return c;
          const lastEv = c.evaluations[c.evaluations.length - 1];
          const newEv = {
            id: nextEvId,
            date: new Date().toLocaleDateString('es-ES'),
            scores: deepClone(lastEv.scores)
          };
          return { ...c, evaluations: [...c.evaluations, newEv] };
        }));
        setActiveEvId(nextEvId);
      };

      const dimLabels = { s: 'SISTEMA', e: 'ENTORNO', p: 'PERSONA' };

      // ── VISTA: PANEL INSTITUCIONAL ──────────────────────────────────────────
      const InstitutionalView = () => (
        <main className="max-w-7xl mx-auto space-y-8">
          {/* Nota filosófica */}
          <div className="bg-slate-900 text-white rounded-[2rem] p-8">
            <div className="flex items-start gap-4">
              <Info size={20} className="text-blue-400 flex-shrink-0 mt-1" />
              <div>
                <h2 className="text-xs font-black uppercase tracking-widest text-blue-400 mb-2">Marco Epistemológico PCP v6.0</h2>
                <p className="text-xs text-slate-300 leading-relaxed">
                  Este instrumento evalúa la <strong className="text-white">coherencia funcional dentro del PFR individual</strong> de cada persona,
                  nunca en comparación con otras personas ni con normas poblacionales.
                  Dimensiones: <strong className="text-white">Sistema · Entorno · Persona</strong> (S·E·P).
                  R_abs = mínimo de S, E, P — detecta la barrera estructural real, no el promedio.
                  Calidad de Vida pondera ×1.5 para priorizar bienestar sobre rendimiento.
                </p>
              </div>
            </div>
          </div>

          {cases.length === 0 && (
            <div className="bg-white rounded-[2rem] border border-amber-200 p-8 shadow-sm">
              <h3 className="text-lg font-black text-slate-900 mb-2">No hay expedientes cargados en esta ruta</h3>
              <p className="text-sm text-slate-600 mb-5">
                Puede ocurrir si los datos estaban guardados en otro origen <code>file://</code>. Puedes recuperarlos importando un JSON o probando claves antiguas.
              </p>
              <div className="flex flex-wrap gap-3">
                <button
                  onClick={triggerImportCases}
                  className="px-5 py-3 rounded-2xl text-xs font-black uppercase bg-blue-600 text-white hover:bg-blue-700 transition-all"
                >
                  Importar Expedientes JSON
                </button>
                <button
                  onClick={recoverFromLegacyStorage}
                  className="px-5 py-3 rounded-2xl text-xs font-black uppercase bg-amber-50 text-amber-700 border border-amber-200 hover:bg-amber-100 transition-all"
                >
                  Intentar Recuperación Local
                </button>
                <button
                  onClick={refreshStorageDiagnostics}
                  className="px-5 py-3 rounded-2xl text-xs font-black uppercase bg-slate-100 text-slate-700 border border-slate-200 hover:bg-slate-200 transition-all"
                >
                  Actualizar Diagnóstico
                </button>
              </div>
              {storageDiagnostics.length > 0 && (
                <div className="mt-6 overflow-x-auto">
                  <table className="w-full text-left border border-slate-200 rounded-xl overflow-hidden">
                    <thead className="bg-slate-50 text-[10px] uppercase font-black text-slate-500">
                      <tr>
                        <th className="px-3 py-2">Clave</th>
                        <th className="px-3 py-2 text-center">Expedientes</th>
                        <th className="px-3 py-2 text-center">Tamaño</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100 text-xs">
                      {storageDiagnostics.slice(0, 12).map(item => (
                        <tr key={item.key}>
                          <td className="px-3 py-2 font-mono text-[11px] text-slate-700">{item.key}</td>
                          <td className="px-3 py-2 text-center font-black">{item.count}</td>
                          <td className="px-3 py-2 text-center text-slate-500">{item.rawLength}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          )}

          {/* KPIs */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm">
              <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Cupo Nivel 3</div>
              <div className="text-5xl font-black">{cases.filter(c => {
                const latestEv = getLatestEvaluation(c);
                const r = latestEv ? computeResults(latestEv) : null;
                return getAssignedLevel(c, r) === 3;
              }).length} <span className="text-2xl text-slate-300">/ {CUPOS.N3}</span></div>
            </div>
            <div className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm">
              <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Alertas Críticas</div>
              <div className="text-5xl font-black text-red-600">
                {cases.filter(c => {
                  const latestEv = getLatestEvaluation(c);
                  if (!latestEv) return false;
                  const r = computeResults(latestEv);
                  return r.areaStats.some(a => a.alertCrit);
                }).length}
              </div>
            </div>
            <div className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm">
              <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Casos Registrados</div>
              <div className="text-5xl font-black text-blue-600">{cases.length}</div>
            </div>
          </div>

          {/* Tabla de casos */}
          <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden">
            <div className="overflow-x-auto">
            <table className="w-full min-w-[920px] text-left table-fixed">
              <thead className="bg-slate-50 text-[10px] uppercase font-black text-slate-400 border-b border-slate-100">
                <tr>
                  <th className="px-8 py-5 w-[38%]">Caso</th>
                  <th className="px-8 py-5 w-[18%]">Nivel</th>
                  <th className="px-8 py-5 w-[14%]">Desempeño Global</th>
                  <th className="px-8 py-5 w-[16%]">Desempeño/Calidad de Vida</th>
                  <th className="px-8 py-5 w-[14%] text-right">Acción</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-50">
                {cases.map(c => {
                  const latestEv = getLatestEvaluation(c);
                  const r = latestEv ? computeResults(latestEv) : null;
                  const assignedLevel = getAssignedLevel(c, r);
                  return (
                    <tr key={c.id} className="hover:bg-slate-50 transition-colors group">
                      <td className="px-8 py-6 align-top">
                        <div className="font-bold text-slate-900">{c.name}</div>
                        <div className="text-[10px] font-mono text-slate-400">{c.id} · {latestEv?.date || '—'}</div>
                      </td>
                      <td className="px-8 py-6 align-top">
                        <span className={`inline-flex items-center justify-center whitespace-nowrap min-w-[7.5rem] px-4 py-2 rounded-full text-[10px] font-black border ${assignedLevel === 3 ? 'bg-red-50 border-red-200 text-red-700'
                          : assignedLevel === 2 ? 'bg-amber-50 border-amber-200 text-amber-700'
                            : 'bg-green-50 border-green-200 text-green-700'
                          }`}>NIVEL {assignedLevel}</span>
                      </td>
                      <td className="px-8 py-6 font-black text-blue-600 text-xl align-top">{typeof r?.globalAbs === 'number' ? r.globalAbs.toFixed(2) : '—'}</td>
                      <td className="px-8 py-6 font-black text-rose-600 align-top">{typeof r?.cvAbs === 'number' ? r.cvAbs.toFixed(2) : '—'}</td>
                      <td className="px-8 py-6 text-right align-top">
                        <div className="flex justify-end gap-2">
                          <button
                            onClick={() => saveToDrive(c)}
                            className={`p-3 border rounded-2xl shadow-sm transition-all ${isDriveConnected ? 'bg-white text-blue-400 hover:text-blue-600 border-slate-100' : 'bg-slate-50 text-slate-300 border-slate-100 opacity-50'}`}
                            title="Guardar este expediente en Drive"
                          ><Globe size={18} /></button>
                          <button
                            onClick={() => exportToExcel([c])}
                            className="p-3 bg-white text-emerald-400 hover:text-emerald-600 border border-slate-100 rounded-2xl shadow-sm transition-all"
                            title="Exportar este caso a Excel"
                          ><FileSpreadsheet size={18} /></button>
                          <button
                            onClick={() => setIsEditCaseModalOpen(c.id)}
                            className="p-3 bg-white text-slate-400 hover:text-blue-600 border border-slate-100 rounded-2xl shadow-sm transition-all"
                            title="Editar nombre/PFR"
                          ><Edit size={18} /></button>
                          <button
                            onClick={() => setIsDeleteConfirmOpen(c.id)}
                            className="p-3 bg-white text-slate-400 hover:text-red-600 border border-slate-100 rounded-2xl shadow-sm transition-all"
                            title="Eliminar expediente"
                          ><Trash2 size={18} /></button>
                          <button
                            onClick={() => { setActiveCaseId(c.id); setActiveEvId(latestEv?.id || null); setView('case'); }}
                            className="p-3 bg-white text-slate-400 group-hover:text-blue-600 border border-slate-100 rounded-2xl shadow-sm transition-all"
                          ><ChevronRight /></button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            </div>
          </div>
        </main>
      );

      // ── COMPONENTE GRÁFICO (Chart.js) ──────────────────────────────
      const VisualDashboard = ({ areaStats, evaluations }) => {
        const radarRef = React.useRef(null);
        const barRef = React.useRef(null);
        const lineRef = React.useRef(null);
        const radarInstance = React.useRef(null);
        const barInstance = React.useRef(null);
        const lineInstance = React.useRef(null);

        React.useEffect(() => {
          if (!radarRef.current || !barRef.current || !lineRef.current) return;

          const labels = areaStats.map(a => a.name);
          const pData = areaStats.map(a => a.absP || 0);
          const dData = areaStats.map(a => a.abs || 0);
          const sData = areaStats.map(a => a.absS || 0);
          const eData = areaStats.map(a => a.absE || 0);

          if (radarInstance.current) radarInstance.current.destroy();
          radarInstance.current = new Chart(radarRef.current.getContext('2d'), {
            type: 'radar',
            data: {
              labels: ['Acceso', 'Regulación', 'Participación', 'Comunicativa', 'Calidad de Vida'],
              datasets: [
                {
                  label: 'Capacidad (P)',
                  data: pData,
                  borderColor: '#2563EB',
                  backgroundColor: 'rgba(37, 99, 235, 0.05)',
                  borderWidth: 2, pointRadius: 2
                },
                {
                  label: 'Desempeño (D)',
                  data: dData,
                  borderColor: '#10B981',
                  backgroundColor: 'rgba(16, 185, 129, 0.05)',
                  borderWidth: 2, pointRadius: 2
                }
              ]
            },
            options: {
              responsive: true, maintainAspectRatio: false,
              scales: { r: { min: 0, max: 4, ticks: { backdropColor: 'transparent', font: { size: 8 } } } },
              plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 9 } } } }
            }
          });

          if (barInstance.current) barInstance.current.destroy();
          barInstance.current = new Chart(barRef.current.getContext('2d'), {
            type: 'bar',
            data: {
              labels: ['Acceso', 'Regulación', 'Participación', 'Comunicación', 'CdVida'],
              datasets: [
                { label: 'Sistema (S)', data: sData, backgroundColor: '#3B82F6', borderRadius: 4 },
                { label: 'Entorno (E)', data: eData, backgroundColor: '#10B981', borderRadius: 4 }
              ]
            },
            options: {
              responsive: true, maintainAspectRatio: false,
              scales: { y: { min: -3, max: 3, ticks: { font: { size: 9 } } } },
              plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 9 } } } }
            }
          });

          if (lineInstance.current) lineInstance.current.destroy();
          if (evaluations && evaluations.length > 0) {
            const timelineLabels = evaluations.map(e => e.date);
            const timelineDData = evaluations.map(e => computeResults(e).globalAbs);
            const timelinePData = evaluations.map(e => computeResults(e).globalP);

            lineInstance.current = new Chart(lineRef.current.getContext('2d'), {
              type: 'line',
              data: {
                labels: timelineLabels,
                datasets: [
                  { label: 'D', data: timelineDData, borderColor: '#10B981', backgroundColor: 'transparent', borderWidth: 2, tension: 0.1 },
                  { label: 'P', data: timelinePData, borderColor: '#2563EB', backgroundColor: 'transparent', borderWidth: 2, tension: 0.1 }
                ]
              },
              options: {
                responsive: true, maintainAspectRatio: false,
                scales: { y: { min: 0, max: 4, ticks: { font: { size: 9 } } }, x: { ticks: { font: { size: 8 } } } },
                plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 9 } } } }
              }
            });
          }

          return () => {
            if (radarInstance.current) radarInstance.current.destroy();
            if (barInstance.current) barInstance.current.destroy();
            if (lineInstance.current) lineInstance.current.destroy();
          };
        }, [areaStats, evaluations]);

        return (
          <div className="bg-white rounded-[2rem] border border-slate-200 shadow-sm p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div className="h-[220px]">
              <h4 className="text-xs font-black uppercase text-slate-500 mb-2 text-center tracking-wider">Perfil P vs D (1-5)</h4>
              <canvas ref={radarRef}></canvas>
            </div>
            <div className="h-[220px]">
              <h4 className="text-xs font-black uppercase text-slate-500 mb-2 text-center tracking-wider">Factores: S y E (-4 a +4)</h4>
              <canvas ref={barRef}></canvas>
            </div>
            <div className="h-[220px]">
              <h4 className="text-xs font-black uppercase text-slate-500 mb-2 text-center tracking-wider">Evolución Histórica</h4>
              <canvas ref={lineRef}></canvas>
            </div>
          </div>
        );
      };

      // ── COMPONENTE: Comparativa Histórica ──────────────────────────────
      const HistoricalComparison = ({ evaluations }) => {
        if (!evaluations || evaluations.length < 2) return null;

      const evs = evaluations.slice(-4);
      const resultsByEv = evs.map(e => computeResults(e));
      const fmtSigned = (value) => (isFiniteNumber(value) ? (value > 0 ? `+${value.toFixed(2)}` : value.toFixed(2)) : '—');

        const getDeltaIcon = (prev, curr) => {
          if (prev === null || curr === null) return '—';
          if (curr > prev) return <span className="text-green-600 font-black">↑</span>;
          if (curr < prev) return <span className="text-red-500 font-black">↓</span>;
          return <span className="text-slate-400 font-bold">=</span>;
        };

        const getReason = (prevRes, currRes) => {
          if (!prevRes || !currRes) return '';
          const dD = currRes.globalAbs - prevRes.globalAbs;
          if (dD > 0) return <span className="text-green-600">Mejora de Desempeño impulsada por Factores de Apoyo.</span>;

          if (currRes.globalS < prevRes.globalS) return <span className="text-red-600">Frenado debido a Barrera en Sistema (S).</span>;
          if (currRes.globalE < prevRes.globalE) return <span className="text-red-600">Frenado debido a Barrera en Entorno (E).</span>;
          if (currRes.globalP < prevRes.globalP) return <span className="text-rose-600">Tranque por Descenso de Capacidad (P).</span>;
          return <span className="text-slate-400">Sin cambios estructurales significativos.</span>;
        };

        return (
          <div className="bg-white rounded-[2rem] border border-slate-200 shadow-sm p-6 mt-4">
            <div className="flex items-center gap-2 mb-4">
              <svg className="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
              <h4 className="text-xs font-black uppercase text-slate-500 tracking-wider">Comparativa de Avances y Diagnóstico</h4>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full text-left text-xs">
                <thead>
                  <tr className="bg-slate-50 text-[9px] uppercase font-black text-slate-400 border-b border-slate-100">
                    <th className="px-4 py-3">Fecha</th>
                    <th className="px-4 py-3">Global D</th>
                    <th className="px-4 py-3">Ganancia Δ</th>
                    <th className="px-4 py-3">S (Sistema)</th>
                    <th className="px-4 py-3">E (Entorno)</th>
                    <th className="px-4 py-3">P (Persona)</th>
                    <th className="px-4 py-3">Diagnóstico Evolutivo</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-50">
                  {resultsByEv.map((r, i) => {
                    const prev = i > 0 ? resultsByEv[i - 1] : null;
                    const dD = prev ? r.globalAbs - prev.globalAbs : 0;
                    return (
                      <tr key={i} className="hover:bg-slate-50/50 transition-colors">
                        <td className="px-4 py-4 font-black text-slate-900">{evs[i].date}</td>
                        <td className="px-4 py-4 font-bold flex items-center gap-1.5">
                          {toExcelMetric(r.globalAbs)} {prev && getDeltaIcon(prev.globalAbs, r.globalAbs)}
                        </td>
                        <td className={`px-4 py-4 font-black ${r.globalGain > 0 ? 'text-green-600' : 'text-slate-600'}`}>
                          {fmtSigned(r.globalGain)}
                        </td>
                        <td className="px-4 py-4 flex items-center gap-1">
                          {toExcelMetric(r.globalS)} {prev && getDeltaIcon(prev.globalS, r.globalS)}
                        </td>
                        <td className="px-4 py-4">
                          <div className="flex items-center gap-1">
                            {toExcelMetric(r.globalE)} {prev && getDeltaIcon(prev.globalE, r.globalE)}
                          </div>
                        </td>
                        <td className="px-4 py-4">
                          <div className="flex items-center gap-1">
                            {toExcelMetric(r.globalP)} {prev && getDeltaIcon(prev.globalP, r.globalP)}
                          </div>
                        </td>
                        <td className="px-4 py-4 text-[9px] font-bold">
                          {prev ? getReason(prev, r) : <span className="text-slate-300 font-medium">Línea de Base</span>}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      };

      const EvaluationRadarCard = ({ evaluation, title, dimConfig, caseData }) => {
        const canvasRef = React.useRef(null);
        const chartRef = React.useRef(null);
        const evaluationResults = React.useMemo(() => computeResults(evaluation, dimConfig), [evaluation, dimConfig]);
        const assignedLevel = getAssignedLevel(caseData, evaluationResults);

        React.useEffect(() => {
          if (!canvasRef.current || !evaluationResults) return;

          if (chartRef.current) chartRef.current.destroy();
          chartRef.current = new Chart(canvasRef.current.getContext('2d'), {
            type: 'radar',
            data: {
              labels: AREAS.map(a => a.name),
              datasets: [
                {
                  label: 'Desempeño (D)',
                  data: evaluationResults.areaStats.map(a => a.abs || 0),
                  borderColor: '#2563EB',
                  backgroundColor: 'rgba(37, 99, 235, 0.08)',
                  borderWidth: 2,
                  pointRadius: 2
                },
                {
                  label: 'Capacidad (P)',
                  data: evaluationResults.areaStats.map(a => a.absP || 0),
                  borderColor: '#7c3aed',
                  backgroundColor: 'rgba(124, 58, 237, 0.06)',
                  borderWidth: 2,
                  pointRadius: 2
                }
              ]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              scales: {
                r: {
                  min: 0,
                  max: 4,
                  ticks: { backdropColor: 'transparent', font: { size: 8 } }
                }
              },
              plugins: {
                legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 9 } } }
              }
            }
          });

          return () => {
            if (chartRef.current) chartRef.current.destroy();
          };
        }, [evaluationResults]);

        return (
          <div className="bg-white rounded-[2rem] border border-slate-200 shadow-sm p-5">
            <div className="flex items-start justify-between gap-4 mb-4">
              <div>
                <div className="text-xs font-black uppercase tracking-widest text-slate-400">Registro</div>
                <h4 className="text-base font-black text-slate-900">{title}</h4>
              </div>
              <div className="text-right">
                <div className="text-[10px] font-black uppercase tracking-widest text-slate-400">Nivel</div>
                <div className="text-lg font-black text-blue-600">N{assignedLevel}</div>
              </div>
            </div>
            <div className="h-[220px]">
              <canvas ref={canvasRef}></canvas>
            </div>
            <div className="mt-4 grid grid-cols-3 gap-2 text-center">
              <div className="bg-slate-50 rounded-2xl p-3">
                <div className="text-[9px] font-black uppercase text-slate-400">D Global</div>
                <div className="text-lg font-black text-slate-900">{typeof evaluationResults.globalAbs === 'number' ? evaluationResults.globalAbs.toFixed(2) : '—'}</div>
              </div>
              <div className="bg-slate-50 rounded-2xl p-3">
                <div className="text-[9px] font-black uppercase text-slate-400">QoL</div>
                <div className="text-lg font-black text-rose-600">{typeof evaluationResults.cvAbs === 'number' ? evaluationResults.cvAbs.toFixed(2) : '—'}</div>
              </div>
              <div className="bg-slate-50 rounded-2xl p-3">
                <div className="text-[9px] font-black uppercase text-slate-400">Ganancia</div>
                <div className={`text-lg font-black ${evaluationResults.globalGain > 0 ? 'text-green-600' : evaluationResults.globalGain < 0 ? 'text-red-600' : 'text-slate-600'}`}>
                  {typeof evaluationResults.globalGain === 'number' ? (evaluationResults.globalGain > 0 ? `+${evaluationResults.globalGain.toFixed(2)}` : evaluationResults.globalGain.toFixed(2)) : '—'}
                </div>
              </div>
            </div>
          </div>
        );
      };

      const RegisterEvolutionPanel = ({ caseData, dimConfig }) => {
        if (!caseData || !caseData.evaluations || caseData.evaluations.length === 0) return null;
        const fmtSigned = (value) => (isFiniteNumber(value) ? (value > 0 ? `+${value.toFixed(2)}` : value.toFixed(2)) : '—');

        const evalResults = caseData.evaluations.map(ev => ({
          ev,
          results: computeResults(ev, dimConfig),
          level: getAssignedLevel(caseData, computeResults(ev, dimConfig))
        }));

        const latest = evalResults[evalResults.length - 1];
        const previous = evalResults.length > 1 ? evalResults[evalResults.length - 2] : null;

        const compareAreaChanges = (areaId) => {
          const areaMeta = AREAS.find(a => a.id === areaId);
          const rows = Object.keys(caseData.evaluations[0]?.scores?.[areaId] || {}).map(indId => {
            const meta = MASTER_DB[indId];
            const series = caseData.evaluations.map(ev => getIndicatorMetrics(ev.scores?.[areaId]?.[indId]));
            const numericSeries = series.filter(Boolean).filter(m => m.hasD);
            if (numericSeries.length < 2) return null;

            const first = numericSeries[0];
            const last = numericSeries[numericSeries.length - 1];
            const prev = numericSeries.length > 1 ? numericSeries[numericSeries.length - 2] : null;
            const deltaTotal = last.d - first.d;
            const deltaLast = prev ? last.d - prev.d : deltaTotal;

            return {
              indId,
              name: meta?.name || indId,
              def: meta?.def || '',
              first: first.d,
              last: last.d,
              deltaTotal,
              deltaLast,
              trend: deltaLast > 0 ? 'up' : deltaLast < 0 ? 'down' : 'flat'
            };
          }).filter(Boolean);

          rows.sort((a, b) => Math.abs(b.deltaTotal) - Math.abs(a.deltaTotal));

          const improved = rows.filter(r => r.deltaTotal > 0).length;
          const declined = rows.filter(r => r.deltaTotal < 0).length;
          const stable = rows.filter(r => r.deltaTotal === 0).length;

          return { areaMeta, rows, improved, declined, stable };
        };

        const areaComparisons = AREAS.map(area => compareAreaChanges(area.id));

        return (
          <section className="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden">
            <div className="p-8 bg-slate-900 text-white">
              <div className="flex items-start justify-between gap-6">
                <div>
                  <h3 className="text-xs font-black uppercase tracking-widest text-blue-400 mb-2">Evolución del expediente</h3>
                  <p className="text-sm text-slate-300 max-w-4xl leading-relaxed">
                    Comparación visual de todos los registros del expediente, con gráficas específicas por evaluación y un resumen de evolución e involución por áreas e indicadores.
                  </p>
                </div>
                <div className="text-right">
                  <div className="text-[9px] font-black uppercase tracking-widest text-slate-400">Registros</div>
                  <div className="text-3xl font-black text-white">{caseData.evaluations.length}</div>
                </div>
              </div>
            </div>

            <div className="p-8 space-y-8">
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div className="bg-blue-50 border border-blue-100 rounded-3xl p-5">
                  <div className="text-[10px] font-black uppercase tracking-widest text-blue-600">Último registro</div>
                  <div className="text-lg font-black text-slate-900 mt-1">{latest?.ev?.date || '—'}</div>
                  <div className="text-sm text-slate-600 mt-1">Nivel N{latest?.level || '—'}</div>
                </div>
                <div className="bg-emerald-50 border border-emerald-100 rounded-3xl p-5">
                  <div className="text-[10px] font-black uppercase tracking-widest text-emerald-700">Comparación previa</div>
                  <div className="text-lg font-black text-slate-900 mt-1">{previous?.ev?.date || 'Sin comparación'}</div>
                  <div className="text-sm text-slate-600 mt-1">
                    {previous && latest ? `Δ D global ${fmtSigned(latest.results.globalAbs - previous.results.globalAbs)}` : 'Añade al menos 2 registros'}
                  </div>
                </div>
                <div className="bg-violet-50 border border-violet-100 rounded-3xl p-5">
                  <div className="text-[10px] font-black uppercase tracking-widest text-violet-700">Áreas analizadas</div>
                  <div className="text-lg font-black text-slate-900 mt-1">{AREAS.length}</div>
                  <div className="text-sm text-slate-600 mt-1">Evolución por área e indicador</div>
                </div>
              </div>

              <div>
                <div className="flex items-center gap-2 mb-4">
                  <Info size={16} className="text-blue-600" />
                  <h4 className="text-xs font-black uppercase tracking-widest text-slate-500">Gráficas por registro</h4>
                </div>
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
                  {evalResults.map(({ ev }, index) => (
                    <EvaluationRadarCard
                      key={ev.id}
                      evaluation={ev}
                      title={`Registro ${index + 1} · ${ev.date}`}
                      dimConfig={dimConfig}
                      caseData={caseData}
                    />
                  ))}
                </div>
              </div>

              <div>
                <div className="flex items-center gap-2 mb-4">
                  <Info size={16} className="text-violet-600" />
                  <h4 className="text-xs font-black uppercase tracking-widest text-slate-500">Evolución e involución por áreas</h4>
                </div>
                <div className="space-y-5">
                  {areaComparisons.map(({ areaMeta, rows, improved, declined, stable }) => (
                    <div key={areaMeta.id} className="rounded-[2rem] border border-slate-200 overflow-hidden">
                      <div className="bg-slate-50 px-6 py-5 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                        <div>
                          <div className="text-lg font-black text-slate-900">{areaMeta.name}</div>
                          <div className="text-[10px] font-black uppercase tracking-widest text-slate-400">Comparación acumulada de indicadores</div>
                        </div>
                        <div className="flex gap-3 text-[10px] font-black uppercase">
                          <span className="px-3 py-1 rounded-full bg-green-50 text-green-700 border border-green-100">Mejoran {improved}</span>
                          <span className="px-3 py-1 rounded-full bg-red-50 text-red-700 border border-red-100">Empeoran {declined}</span>
                          <span className="px-3 py-1 rounded-full bg-slate-100 text-slate-600 border border-slate-200">Estables {stable}</span>
                        </div>
                      </div>
                      <div className="overflow-x-auto">
                        <table className="w-full text-left">
                          <thead className="bg-white text-[9px] uppercase font-black text-slate-400 border-b border-slate-100">
                            <tr>
                              <th className="px-6 py-4">Ítem</th>
                              <th className="px-4 py-4">Inicio D</th>
                              <th className="px-4 py-4">Último D</th>
                              <th className="px-4 py-4">Δ acumulada</th>
                              <th className="px-4 py-4">Δ último</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-50">
                            {rows.length > 0 ? rows.map(row => (
                              <tr key={row.indId} className="hover:bg-slate-50/70 transition-colors">
                                <td className="px-6 py-4">
                                  <div className="font-bold text-slate-800 text-sm leading-tight">{row.name}</div>
                                  <div className="text-[9px] text-slate-400 font-medium mt-0.5 leading-tight max-w-xl">{row.def}</div>
                                </td>
                                <td className="px-4 py-4 font-black text-slate-700">{row.first.toFixed(2)}</td>
                                <td className="px-4 py-4 font-black text-slate-900">{row.last.toFixed(2)}</td>
                                <td className={`px-4 py-4 font-black ${row.deltaTotal > 0 ? 'text-green-600' : row.deltaTotal < 0 ? 'text-red-600' : 'text-slate-500'}`}>
                                  {fmtSigned(row.deltaTotal)}
                                </td>
                                <td className={`px-4 py-4 font-black ${row.deltaLast > 0 ? 'text-green-600' : row.deltaLast < 0 ? 'text-red-600' : 'text-slate-500'}`}>
                                  {fmtSigned(row.deltaLast)}
                                </td>
                              </tr>
                            )) : (
                              <tr>
                                <td className="px-6 py-6 text-sm text-slate-400" colSpan="5">
                                  No hay suficiente variación registrada para este área.
                                </td>
                              </tr>
                            )}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </section>
        );
      };

      const EcologicalOnlyPanel = ({ activeEvaluation }) => {
        if (!activeEvaluation) return null;

        const ecoItems = [];
        AREAS.forEach(area => {
          const areaScores = activeEvaluation.scores?.[area.id] || {};
          Object.keys(areaScores).forEach(indId => {
            const score = areaScores[indId];
            if (!score) return;

            const sNum = isNum(score.s) ? parseInt(score.s) : null;
            const eNum = isNum(score.e) ? parseInt(score.e) : null;
            const pIsNP = score.p === 'NP';

            if (pIsNP && (sNum !== null || eNum !== null)) {
              const meta = MASTER_DB[indId];
              const faVals = [sNum, eNum].filter(v => v !== null);
              const fa = faVals.length > 0 ? faVals.reduce((a, b) => a + b, 0) / faVals.length : null;
              ecoItems.push({ indId, area, meta, sNum, eNum, fa });
            }
          });
        });

        if (ecoItems.length === 0) return null;

        const sAll = ecoItems.filter(i => i.sNum !== null).map(i => i.sNum);
        const eAll = ecoItems.filter(i => i.eNum !== null).map(i => i.eNum);
        const avgS = sAll.length > 0 ? sAll.reduce((a, b) => a + b, 0) / sAll.length : null;
        const avgE = eAll.length > 0 ? eAll.reduce((a, b) => a + b, 0) / eAll.length : null;
        const allVals = [...sAll, ...eAll];
        const avgFA = allVals.length > 0 ? allVals.reduce((a, b) => a + b, 0) / allVals.length : null;
        const facilitadores = ecoItems.filter(i => i.fa !== null && i.fa > 0).length;
        const barreras = ecoItems.filter(i => i.fa !== null && i.fa < 0).length;
        const neutros = ecoItems.filter(i => i.fa !== null && i.fa === 0).length;
        const fmtFA = (v) => v !== null ? (v > 0 ? `+${v.toFixed(2)}` : v.toFixed(2)) : '—';
        const clrFA = (v) => v > 0 ? 'text-emerald-300' : v < 0 ? 'text-red-300' : 'text-slate-400';
        const clrFADark = (v) => v > 0 ? 'text-emerald-600' : v < 0 ? 'text-red-500' : 'text-slate-400';
        const rolLabel = (fa) => {
          if (fa === null) return null;
          if (fa > 2) return <span className="text-[10px] font-black text-emerald-700 bg-emerald-50 px-2 py-0.5 rounded-full">Facilitador fuerte</span>;
          if (fa > 0) return <span className="text-[10px] font-black text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full">Facilitador leve</span>;
          if (fa < -2) return <span className="text-[10px] font-black text-red-700 bg-red-50 px-2 py-0.5 rounded-full">Barrera importante</span>;
          if (fa < 0) return <span className="text-[10px] font-black text-red-600 bg-red-50 px-2 py-0.5 rounded-full">Barrera leve</span>;
          return <span className="text-[10px] font-black text-slate-500 bg-slate-100 px-2 py-0.5 rounded-full">Neutro</span>;
        };

        return (
          <div className="bg-white rounded-[2rem] border-2 border-violet-100 shadow-sm overflow-hidden">
            <div className="bg-violet-900 text-white p-6 flex flex-col md:flex-row md:items-center gap-4">
              <div className="flex items-center gap-3 flex-1">
                <div className="p-3 bg-white/10 rounded-2xl">
                  <Globe size={18} />
                </div>
                <div>
                  <h4 className="text-sm font-black uppercase tracking-wider">Contexto Ecológico Exclusivo · P·NP</h4>
                  <p className="text-[10px] text-violet-300 font-semibold mt-0.5">
                    {ecoItems.length} ítem{ecoItems.length !== 1 ? 's' : ''} sin valoración de Persona
                  </p>
                </div>
              </div>
              <div className="flex gap-5 items-center">
                {avgS !== null && (
                  <div className="text-center">
                    <div className="text-[8px] font-black text-blue-300 uppercase tracking-widest mb-0.5">S Media</div>
                    <div className={`text-xl font-black ${clrFA(avgS)}`}>{avgS > 0 ? `+${avgS.toFixed(2)}` : avgS.toFixed(2)}</div>
                  </div>
                )}
                {avgE !== null && (
                  <div className="text-center">
                    <div className="text-[8px] font-black text-emerald-300 uppercase tracking-widest mb-0.5">E Media</div>
                    <div className={`text-xl font-black ${clrFA(avgE)}`}>{avgE > 0 ? `+${avgE.toFixed(2)}` : avgE.toFixed(2)}</div>
                  </div>
                )}
                <div className="text-center border-l border-violet-700 pl-5">
                  <div className="text-[8px] font-black text-violet-300 uppercase tracking-widest mb-0.5">FA Global</div>
                  <div className={`text-xl font-black ${avgFA !== null ? clrFA(avgFA) : 'text-slate-500'}`}>{fmtFA(avgFA)}</div>
                </div>
                <div className="flex gap-3 border-l border-violet-700 pl-5">
                  <div className="text-center">
                    <div className="text-[8px] font-black text-emerald-300 uppercase">Fac.</div>
                    <div className="text-lg font-black text-emerald-300">{facilitadores}</div>
                  </div>
                  <div className="text-center">
                    <div className="text-[8px] font-black text-red-300 uppercase">Bar.</div>
                    <div className="text-lg font-black text-red-300">{barreras}</div>
                  </div>
                  <div className="text-center">
                    <div className="text-[8px] font-black text-slate-400 uppercase">Neu.</div>
                    <div className="text-lg font-black text-slate-400">{neutros}</div>
                  </div>
                </div>
              </div>
            </div>

            <div className="overflow-x-auto">
              <table className="w-full text-left">
                <thead className="bg-slate-50 text-[9px] uppercase font-black text-slate-400 border-b border-slate-100">
                  <tr>
                    <th className="px-6 py-4">Indicador</th>
                    <th className="px-4 py-4">Área</th>
                    <th className="px-4 py-4">Tipo</th>
                    <th className="px-4 py-4 text-blue-500">S (Sistema)</th>
                    <th className="px-4 py-4 text-emerald-600">E (Entorno)</th>
                    <th className="px-4 py-4 text-violet-600">FA Medio</th>
                    <th className="px-4 py-4">Rol Ecológico</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-50">
                  {ecoItems.map(({ indId, area, meta, sNum, eNum, fa }) => (
                    <tr key={indId} className="hover:bg-slate-50/70 transition-colors group">
                      <td className="px-6 py-4">
                        <div className="font-bold text-slate-800 text-xs leading-tight">{meta.name}</div>
                        <div className="text-[9px] text-slate-400 font-medium mt-0.5 leading-tight max-w-xs">{meta.def}</div>
                      </td>
                      <td className="px-4 py-4 text-[11px] text-slate-500 font-semibold whitespace-nowrap">{area.name}</td>
                      <td className="px-4 py-4">
                        <span className={`px-2 py-0.5 rounded-full text-[8px] font-black ${meta.type === 'CRITICO' ? 'bg-red-50 text-red-600' : meta.type === 'ESTRUCTURAL' ? 'bg-amber-50 text-amber-600' : 'bg-slate-100 text-slate-500'}`}>
                          {meta.type}
                        </span>
                      </td>
                      <td className="px-4 py-4">
                        {sNum !== null
                          ? <span className={`text-sm font-black ${clrFADark(sNum)}`}>{sNum > 0 ? `+${sNum}` : sNum}</span>

          </div>

          <div className="max-w-7xl mx-auto mb-6 flex flex-wrap items-center gap-3 text-xs">
            <span className={`px-3 py-1 rounded-full font-black uppercase ${casesFileHandle ? 'bg-cyan-50 text-cyan-700 border border-cyan-200' : 'bg-slate-100 text-slate-500 border border-slate-200'}`}>
              {casesFileHandle ? `Archivo vinculado: ${casesFileName}` : 'Sin archivo local vinculado'}
            </span>
            {REQUIRE_LINKED_FILE && !casesFileHandle && (
              <span className="px-3 py-1 rounded-full font-black uppercase bg-amber-50 text-amber-700 border border-amber-200">
                Modo protegido: vincula archivo para editar
              </span>
            )}
            <button
              onClick={() => setAutoSaveToFile(v => !v)}
              className={`px-3 py-1 rounded-full font-black uppercase border ${autoSaveToFile ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-slate-100 text-slate-600 border-slate-200'}`}
            >
              Auto-guardado: {autoSaveToFile ? 'ON' : 'OFF'}
            </button>
            {lastFileSaveAt && <span className="text-slate-500 font-semibold">Último guardado en archivo: {lastFileSaveAt}</span>}
          </div>

          {view === 'institutional' && <InstitutionalView />}
          {view === 'case' && <CaseView />}

          {detailId && (
            <IndicatorDetail
              indicatorId={detailId.id}
              areaName={detailId.areaName}
              onClose={() => setDetailId(null)}
            />
          )}

          {showMethodology && (
            <MethodologyModal
              onClose={() => setShowMethodology(false)}
            />
          )}

          {isNewCaseModalOpen && (
            <NewCaseModal
              onConfirm={handleCreateCase}
              onClose={() => setIsNewCaseModalOpen(false)}
            />
          )}

          {isEditCaseModalOpen && (
            <EditCaseModal
              caseData={cases.find(c => c.id === isEditCaseModalOpen)}
              onConfirm={handleEditCase}
              onClose={() => setIsEditCaseModalOpen(null)}
            />
          )}

          {isDeleteConfirmOpen && (
            <ConfirmDeleteModal
              caseName={cases.find(c => c.id === isDeleteConfirmOpen)?.name}
              onConfirm={handleDeleteCase}
              onClose={() => setIsDeleteConfirmOpen(null)}
            />
          )}

          {isSettingsOpen && (
            <SettingsModal
              driveConfig={driveConfig}
              isConnected={isDriveConnected}
              onAuth={handleAuth}
              onSaveConfig={(cfg) => { setDriveConfig(cfg); setIsSettingsOpen(false); }}
              onClose={() => setIsSettingsOpen(false)}
            />
          )}

          {isManualEditorOpen && (
            <ManualEditorModal
              manualOverrides={manualOverrides}
              onSave={(next) => {
                setManualOverrides(next);
                setIsManualEditorOpen(false);
              }}
              onClose={() => setIsManualEditorOpen(false)}
            />
          )}

          <input
            ref={importCasesInputRef}
            type="file"
            accept=".json,application/json"
            onChange={handleImportCasesFile}
            className="hidden"
          />
        </div>
      );
    }


    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>

</html>
